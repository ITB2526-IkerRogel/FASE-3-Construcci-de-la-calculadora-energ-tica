<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora energètica de l'Institut Tecnològic de Barcelona (ITB). Analitza el consum d'aigua, electricitat, consumibles i productes de neteja amb dades reals i projeccions IPC.">
  <title>Calculadora ITB — Calculadora Energètica</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./js/chart.min.js"></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="app-wrapper">

    <nav class="main-nav">
      <div class="container nav-inner">
        <a href="./index.html" class="nav-brand">
          <span class="brand-icon">🌿</span>
          Calculadora ITB
        </a>
        <button class="nav-hamburger" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="./index.html" class="active">📊 Històric</a></li>
          <li><a href="./reduccio.html">📉 Calculadora</a></li>
          <li><a href="./pla-accio.html">📋 Pla d'Acció</a></li>
        </ul>
      </div>
    </nav>

    <section class="hero hero-compact">
      <h2>Analitza el teu <span class="gradient-text">consum de recursos</span></h2>
    </section>

    <main class="container-wide" id="app-content">
      <div class="calculator-layout">

        <aside class="dashboard-column">
          <div class="sticky-dashboard calc-controls" style="margin: 0; padding: var(--space-lg);">
            <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: var(--space-md); display: flex; align-items: center; gap: 8px;">⚙️ Paràmetres</h3>
            <div class="controls-grid" style="grid-template-columns: 1fr; gap: var(--space-md);">
              <div class="form-group">
                <label for="calc-indicator">Indicador</label>
                <select id="calc-indicator"></select>
              </div>
              <div class="form-group">
                <label for="calc-view">Vista de Dades</label>
                <select id="calc-view">
                  <option value="projectat" id="opt-projectat"></option>
                  <option value="actual" id="opt-actual"></option>
                </select>
              </div>
              <div class="form-group">
                <label for="calc-mode">Mode de càlcul</label>
                <select id="calc-mode">
                  <option value="anual">📅 Any complet</option>
                  <option value="periode">📆 Període personalitzat</option>
                </select>
              </div>
              <div id="periode-controls" style="display: none;">
                <div class="form-group">
                  <label for="calc-mes-inici">Mes d'inici</label>
                  <select id="calc-mes-inici"></select>
                </div>
                <div class="form-group">
                  <label for="calc-mes-fi">Mes de fi</label>
                  <select id="calc-mes-fi"></select>
                </div>
              </div>
              <div class="form-group" style="margin-top: 10px;">
                <button class="btn btn-primary" id="calc-btn" style="width: 100%;">🔄 Calcular Impacte</button>
              </div>
            </div>
          </div>
        </aside>

        <div class="actions-column">
          <div class="results-grid" id="results-grid" style="margin-bottom: var(--space-lg);"></div>

          <section class="tabs-section" style="margin-bottom: var(--space-xl);">
            <div class="tabs-header-nav">
              <button class="tab-nav-btn active" onclick="switchTab(event, 'tab-evolucio')">📈 Evolució</button>
              <button class="tab-nav-btn" onclick="switchTab(event, 'tab-costos')">🍩 Costos</button>
              <button class="tab-nav-btn" onclick="switchTab(event, 'tab-detall')">📋 Detall</button>
            </div>

            <div class="tabs-content-wrapper">
              <div id="tab-evolucio" class="tab-pane active">
                <div class="chart-container" style="border:none; box-shadow:none; padding:0;">
                  <div class="chart-wrapper" style="height: 350px;">
                    <canvas id="main-chart"></canvas>
                  </div>
                </div>
              </div>
              <div id="tab-costos" class="tab-pane">
                <div class="chart-container" style="border:none; box-shadow:none; padding:0;">
                  <div class="chart-wrapper" style="height: 350px;">
                    <canvas id="cost-chart"></canvas>
                  </div>
                </div>
              </div>
              <div id="tab-detall" class="tab-pane">
                <div class="data-table-wrapper" style="border:none;">
                  <table class="data-table">
                    <thead id="table-head">
                      <tr>
                        <th>Mes</th>
                        <th>Consum</th>
                        <th>Cost</th>
                        <th>Nivell</th>
                      </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </section>

          <section class="calc-section" id="comparison-section" style="margin-bottom: 0;"></section>
        </div>
      </div>

      <div class="full-width-merged-content">
        <section class="calc-section historic-full-width">
          <div class="section-header">
            <div>
              <h2 class="section-title">🏆 Històric Dels Nostres Consums</h2>
              <p class="section-subtitle" id="dynamic-year-subtitle" style="font-size: 0.8rem;">Consum estimat per a l'any <span class="dynamic-year"></span> (Complet vs. Període Lectiu)</p>
            </div>
            <div class="toggle-pill">
              <label>
                <input type="checkbox" id="toggle-millores-global">
                Aplicar Pla d'Acció (-30%)
              </label>
            </div>
          </div>
          <div class="kpi-grid" id="grid-8-calculs"></div>
        </section>

        <div class="kpi-grid" id="kpi-grid"></div>

        <section class="calc-section" id="ipc-banner"></section>
      </div>

    </main>

    <footer class="main-footer">
      <div class="container">
        <p>🌿 Calculadora ITB — Calculadora Energètica · Fase 3</p>
      </div>
    </footer>

  </div>

  <script>
    function switchTab(evt, tabId) {
      const panes = document.querySelectorAll('.tab-pane');
      const btns = document.querySelectorAll('.tab-nav-btn');
      panes.forEach(p => p.classList.remove('active'));
      btns.forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      evt.currentTarget.classList.add('active');
    }
  </script>

  <script src="./js/calculator.js"></script>
  <script src="./js/charts.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
