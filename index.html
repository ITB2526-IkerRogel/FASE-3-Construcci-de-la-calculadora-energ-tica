<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Datos - Vista Principal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @-webkit-keyframes spinner { 0% { -webkit-transform: rotate(0deg); } 100% { -webkit-transform: rotate(360deg); } }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">DataVisualizer v2.0</h1>
            <div class="text-sm text-gray-500">Origen: <span class="font-mono text-indigo-500">dataclean.json</span></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">

        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Resumen de Información</h2>
            <p class="mt-2 text-gray-600">Visualización de datos procesados y listos para análisis.</p>
        </div>

        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-500">Cargando datos externos...</p>
        </div>

        <div id="content-area" class="hidden">
            <div class="overflow-x-auto bg-white rounded-xl shadow-sm border border-gray-200">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr id="table-headers">
                            </tr>
                    </thead>
                    <tbody id="data-table-body" class="bg-white divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="error-state" class="hidden p-4 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-700 text-center">No se pudo cargar el archivo <span class="font-bold">dataclean.json</span>. Asegúrate de que el archivo existe y es un JSON válido.</p>
        </div>

    </main>

    <script>
        /**
         * Función principal para cargar y renderizar los datos
         */
        async function loadData() {
            const loadingEl = document.getElementById('loading-state');
            const contentEl = document.getElementById('content-area');
            const errorEl = document.getElementById('error-state');
            const tableBody = document.getElementById('data-table-body');
            const tableHeaders = document.getElementById('table-headers');

            try {
                // Hacemos el "link" al archivo externo
                const response = await fetch('dataclean.json');

                if (!response.ok) throw new Error('Error al cargar el archivo');

                const data = await response.json();

                if (data.length > 0) {
                    // 1. Generar encabezados basados en las llaves del primer objeto
                    const keys = Object.keys(data[0]);
                    keys.forEach(key => {
                        const th = document.createElement('th');
                        th.className = "px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider";
                        th.textContent = key;
                        tableHeaders.appendChild(th);
                    });

                    // 2. Generar las filas
                    data.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-gray-50 transition-colors";

                        keys.forEach(key => {
                            const td = document.createElement('td');
                            td.className = "px-6 py-4 whitespace-nowrap text-sm text-gray-600";
                            td.textContent = item[key];
                            tr.appendChild(td);
                        });

                        tableBody.appendChild(tr);
                    });

                    // Mostrar contenido
                    loadingEl.classList.add('hidden');
                    contentEl.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            }
        }

        // Ejecutar la carga al iniciar
        document.addEventListener('DOMContentLoaded', loadData);
    </script>

</body>
</html>
