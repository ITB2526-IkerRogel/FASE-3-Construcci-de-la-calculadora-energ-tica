<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora interactiva de reducció del consum energètic i de recursos de l'ITB. Selecciona accions i veure l'impacte en temps real.">
  <title>Calculadora de Reducció — Calculadora ITB</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="/js/chart.min.js"></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="app-wrapper">

    <nav class="main-nav">
      <div class="container nav-inner">
        <a href="./index.html" class="nav-brand">
          <span class="brand-icon">🌿</span>
          Calculadora ITB
        </a>
        <button class="nav-hamburger" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="./index.html">📊 Històric</a></li>
          <li><a href="./reduccio.html" class="active">📉 Calculadora</a></li>
          <li><a href="./pla-accio.html">📋 Pla d'Acció</a></li>
        </ul>
      </div>
    </nav>

    <section class="hero hero-compact">
        <h2>Calcula el teu <span class="gradient-text">impacte real</span></h2>
    </section>

    <main class="container-wide">
      <div class="calculator-layout">

        <aside class="dashboard-column">
          <div class="sticky-dashboard" id="impact-dashboard">
            </div>
        </aside>

        <div class="actions-column">
          <section class="calc-section">
            <div class="actions-header-pretty">
              <div>
                <h2 class="section-title">🎯 Accions de Reducció</h2>
                <p class="section-subtitle">Fes clic a cada acció per activar-la. L'impacte es recalcula a l'instant.</p>
              </div>
            </div>
            <div class="reduction-grid" id="reduction-grid">
              </div>
          </section>
        </div>

      </div>
    </main>

    <div class="stats-footer-sticky-wrapper">
      <div class="stats-footer-grid">
        <div class="stat-highlight">
          <div class="big-number green" id="stat-reduccio">0%</div>
          <div class="stat-label">Reducció Global</div>
        </div>
        <div class="stat-highlight">
          <div class="big-number purple" id="stat-accions">0</div>
          <div class="stat-label">Accions Actives</div>
        </div>
        <div class="stat-highlight">
          <div class="big-number amber" id="stat-circular">0%</div>
          <div class="stat-label">Economia Circular</div>
        </div>
        <div class="stat-highlight">
          <div class="big-number blue" id="stat-roi-footer">—</div>
          <div class="stat-label">Retorn Inversió</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/calculator.js"></script>
  <script src="./js/charts.js"></script>
  <script src="./js/reduction.js"></script>
</body>
</html>
